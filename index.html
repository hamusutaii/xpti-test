<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="color-scheme" content="light only">
  <meta name="description" content="基于 20 个关系情境题的移动端关系风格评估。">
  <title>关系风格评估</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page-noise" aria-hidden="true"></div>
  <div class="page-accent page-accent--one" aria-hidden="true"></div>
  <div class="page-accent page-accent--two" aria-hidden="true"></div>

  <main class="shell">
    <header class="topbar">
      <button id="debug-toggle" class="brand-button" type="button">RELATION PROFILE</button>
      <div class="topbar-actions">
        <a id="stats-link" class="topbar-link" href="#" target="_blank" rel="noreferrer" hidden>统计后台</a>
        <button id="clear-data-top" class="topbar-link" type="button" hidden>清空记录</button>
      </div>
    </header>

    <section id="app" class="app-root" aria-live="polite"></section>
  </main>

  <noscript>
    <section class="noscript-panel">
      <h1>需要开启 JavaScript</h1>
      <p>这个测试依赖原生 JavaScript 完成题目切换、结果计算和本地存储。请开启后重新打开本页。</p>
    </section>
  </noscript>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
